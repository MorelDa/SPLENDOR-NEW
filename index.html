    <style>
        :root { --red: #ff0000; --black: #000000; --card-bg: #111; --text: #ffffff; --gray: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        nav {
            background: #000;
            padding: 15px 5%;
            border-bottom: 4px solid var(--red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: var(--red); }
        .live-tag { background: var(--red); padding: 4px 12px; border-radius: 3px; font-size: 0.7rem; font-weight: 800; animation: blink 1.2s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .section-title { 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            border-left: 5px solid var(--red); 
            padding-left: 15px; 
        }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card img { width: 100%; height: 210px; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        
        .card-content { padding: 20px; flex-grow: 1; }
        .card-category { color: var(--red); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; margin-bottom: 12px; color: #fff; }
        .card-date { color: var(--gray); font-size: 0.75rem; font-weight: 600; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 900px; margin: 40px auto; background: #0a0a0a; border: 1px solid #333; position: relative; }
        .modal-body { padding: 40px; }
        .modal-body h2 { font-size: 2.5rem; margin-bottom: 20px; line-height: 1.1; font-weight: 800; }
        .modal-body p { color: #ddd; line-height: 1.8; font-size: 1.15rem; margin-bottom: 20px; }
        .close-btn { position: absolute; right: 25px; top: 15px; font-size: 45px; color: var(--red); cursor: pointer; z-index: 10; font-weight: bold; }

        footer { text-align: center; padding: 60px; color: #555; font-size: 0.8rem; border-top: 1px solid #111; margin-top: 50px; text-transform: uppercase; letter-spacing: 2px; }
    </style>

const grid = document.getElementById('mainGrid');
const modal = document.getElementById('newsModal');
const modalData = document.getElementById('modalData');

function renderNews() {
    allNews.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <img src="${item.img}" alt="Noticia">
            <div class="card-content">
                <span class="card-category">${item.cat}</span>
                <h3 class="card-title">${item.title}</h3>
                <span class="card-date">${item.date}</span>
            </div>
        `;
        div.onclick = () => openModal(item);
        grid.appendChild(div);
    });
}

function openModal(item) {
    modalData.innerHTML = `
        <img src="${item.img}" style="width:100%; max-height:450px; object-fit:cover; border-bottom: 5px solid var(--red);">
        <div class="modal-body">
            <span class="card-category">${item.cat}</span>
            <h2>${item.title}</h2>
            <span class="card-date">${item.date}</span>
            <p style="margin-top:20px;">${item.desc}</p>
        </div>
    `;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

window.onclick = (event) => { if (event.target == modal) closeModal(); }

renderNews();
